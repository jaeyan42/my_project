name: push 기반 CI/CD 테스트

on:
  push:
    branches: [ "container" ]

jobs:
  # app 관련 이미지 생성 허브에 push (소스코드/리소스 모두 포함되어있음)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 checkout
        uses: actions/checkout@v3

      - name: docker hub login
        uses: docker/login-action@v2
        with:                                                                                                                                                                                                                                                                                                                                     
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: build and push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/fastapi-app:1.1

      - name: build and push nginx-proxy
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/nginx-proxy:1.0
  # EC2에 docker-compose.yml, 설정파일등 copy, 도커 컴포즈 작동
  cd:
    needs: ci  # Docker Hub 푸시(CI) 완료 후 실행
    # cd 작업을 위한 서버 세팅
    runs-on: ubuntu-latest
    steps:
      # 1.소스코드 체크아웃
      - name: 코드 checkout
        uses: actions/checkout@v3

      # 2. EC2로 docker-compose.yml 파일 복사
      - name: docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "./docker-compose.yml"
          target: "/home/ubuntu"

      # 2. EC2 접속 후 최신 이미지 받아와서 실행
      - name: Run docker-compose on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # 작업 디렉토리 이동(docker-compose.yml 존재하는 위치)
            cd /home/ubuntu
            # 필요시 .env 생성 -> 시크릿 변수 읽어서 파일처리 (여긴 생략)
            # 최신 이미지 가져오기
            #sudo docker-compose pull (느려서 일단 제거)
            # 컨테이너 구성 -> 신규 혹은 교체
            sudo docker-compose up -d
            # 이미지가 최신으로 교체되면 기존 = 가비지 날려줌
            sudo docker image prune -f
    