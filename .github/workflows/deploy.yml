name: push 기반 CI/CD 테스트

on:
  push:
    branches: [ "container" ]

jobs:
  # app 관련 이미지 생성 허브에 push (소스코드/리소스 모두 포함되어있음)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 checkout
        uses: actions/checkout@v3

      - name: docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: build and push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/fastapi-app:1.0

      - name: build and push nginx-proxy
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/nginx-proxy:1.0
  # EC2에 docker-compose.yml, 설정파일등 copy, 도커 컴포즈 작동
